<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据看板 · 玩家答题统计</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#f0ece2; --paper:#f5f1e8; --ink:#1a1714; --ink-soft:#4a443c;
    --ink-faint:#8c857a; --line:#d6cfc0; --good:#3c6b4f; --bad:#a8453a;
    --card:#faf7ef; --gold:#b8860b; --blue:#3a6b8c; --accent:#8a5a3a;
  }
  html,body{background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Songti SC",serif;
    line-height:1.7;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;}
  body{padding:22px 0 40px;min-height:100vh;}
  .wrap{max-width:860px;margin:0 auto;padding:0 18px;}
  h1{font-weight:900;font-size:clamp(22px,5vw,32px);letter-spacing:.04em;text-align:center;margin-bottom:4px;}
  .sub{text-align:center;font-size:12.5px;color:var(--ink-faint);margin-bottom:20px;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px;}
  .panel h2{font-size:15px;font-weight:800;letter-spacing:.03em;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--line);}
  /* 核心指标 */
  .kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .kpi .box{background:rgba(0,0,0,.03);border-radius:9px;padding:14px 8px;text-align:center;}
  .kpi .n{font-size:clamp(20px,5vw,26px);font-weight:900;color:var(--accent);font-variant-numeric:tabular-nums;}
  .kpi .l{font-size:11.5px;color:var(--ink-faint);margin-top:3px;}
  /* 条形 */
  .row{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:13px;}
  .row .nm{flex:0 0 clamp(96px,30vw,150px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .barwrap{flex:1;height:18px;background:rgba(0,0,0,.06);border-radius:5px;overflow:hidden;position:relative;}
  .row .bar{height:100%;border-radius:5px;background:var(--accent);transition:width .5s;min-width:2px;}
  .row .pct{flex:0 0 84px;text-align:right;font-weight:700;font-size:12px;font-variant-numeric:tabular-nums;}
  /* 排行榜 */
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:left;}
  th{font-size:11.5px;color:var(--ink-faint);font-weight:700;}
  td.sc{text-align:right;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;}
  .rk{display:inline-flex;width:20px;justify-content:center;font-weight:800;}
  .rk.g1{color:#d4af37;} .rk.g2{color:#9aa0a6;} .rk.g3{color:#c77b3a;}
  /* 登录 */
  #login{max-width:320px;margin:18vh auto 0;text-align:center;}
  #login input{width:100%;font-size:18px;text-align:center;letter-spacing:.3em;padding:12px;border:1.5px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);margin:14px 0;}
  #login input:focus{outline:none;border-color:var(--accent);}
  .btn{width:100%;border:1.5px solid var(--accent);background:var(--accent);color:var(--paper);font-family:inherit;font-size:15px;font-weight:700;padding:12px;border-radius:8px;cursor:pointer;letter-spacing:.05em;}
  .btn:active{transform:scale(.98);}
  .err{color:var(--bad);font-size:13px;min-height:18px;margin-top:8px;}
  .muted{color:var(--ink-faint);font-size:11.5px;text-align:center;margin-top:18px;line-height:1.7;}
  .loading{text-align:center;color:var(--ink-faint);padding:30px;}
  .logout{display:inline-block;font-size:11.5px;color:var(--blue);cursor:pointer;margin-left:8px;}
</style>
</head>
<body>
<div class="wrap">
  <!-- 登录页 -->
  <div id="login">
    <h1>📊 数据看板</h1>
    <div class="sub">玩家答题数据统计 · 需口令访问</div>
    <input id="pin" type="password" inputmode="numeric" placeholder="请输入口令" autocomplete="off">
    <button class="btn" id="loginBtn">进入</button>
    <div class="err" id="loginErr"></div>
    <div class="muted">登录后 2 小时内免再次验证</div>
  </div>

  <!-- 看板主体 -->
  <div id="board" style="display:none">
    <h1>📊 数据看板</h1>
    <div class="sub" id="boardSub">加载中…<span class="logout" id="logout">退出</span></div>
    <div id="content"><div class="loading">⏳ 正在拉取数据…</div></div>
  </div>
</div>

<script src="config.js?v=20260628toastnowrap"></script>
<script>
"use strict";
var AUTH_KEY='dash_auth_ts_vc', AUTH_TTL=2*3600*1000; // 2小时免登录(key带项目后缀,避免同源github.io下两看板共享登录态)
var SB=(typeof CONFIG!=='undefined'&&CONFIG.supabase)||{};

function sbGet(pathq){
  return fetch(SB.url.replace(/\/$/,'')+'/rest/v1/'+pathq,{
    headers:{'apikey':SB.key,'Authorization':'Bearer '+SB.key}
  }).then(function(r){return r.json();});
}

// ---- 登录 ----
function loggedIn(){
  try{var ts=+localStorage.getItem(AUTH_KEY); return ts && (Date.now()-ts)<AUTH_TTL;}catch(e){return false;}
}
function doLogin(){
  var pin=document.getElementById('pin').value.trim();
  var err=document.getElementById('loginErr');
  err.textContent='校验中…';
  // 口令存 Supabase 的 dashboard_auth 表,不写死在前端源码
  sbGet('dashboard_auth?select=pin&limit=1').then(function(rows){
    var real=(rows&&rows[0]&&rows[0].pin)||'';
    if(pin && pin===real){
      try{localStorage.setItem(AUTH_KEY,String(Date.now()));}catch(e){}
      enter();
    }else{
      err.textContent='口令错误';
    }
  }).catch(function(){ err.textContent='网络错误,稍后重试'; });
}
function logout(){ try{localStorage.removeItem(AUTH_KEY);}catch(e){} location.reload(); }

function enter(){
  document.getElementById('login').style.display='none';
  document.getElementById('board').style.display='block';
  document.getElementById('logout').onclick=logout;
  loadData();
}

// ---- 数据加载 + 渲染 ----
function pct(n,t){return t?(n/t*100):0;}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function loadData(){
  Promise.all([
    sbGet('results?select=*&order=created_at.desc&limit=5000'),
    sbGet('visits?select=id,visitor_id,inviter_id&limit=5000')
  ]).then(function(res){
    var R=res[0]||[], V=res[1]||[];
    if(R.code){ document.getElementById('content').innerHTML='<div class="loading">读取失败:'+esc(R.message||'')+'</div>'; return; }
    render(R,V);
  }).catch(function(e){
    document.getElementById('content').innerHTML='<div class="loading">加载出错,请刷新重试</div>';
  });
}

function render(R,V){
  var total=R.length;
  var players={}; R.forEach(function(r){if(r.player_id)players[r.player_id]=1;});
  var nPlayers=Object.keys(players).length;
  // created_at 已存北京时间(墙钟值),取北京时间今天的日期串,与 created_at 前10位纯字符串比对(避免Date二次时区转换偏移)
  var bjToday=new Date(Date.now()+8*3600*1000).toISOString().slice(0,10);
  var todayN=R.filter(function(r){return String(r.created_at||'').slice(0,10)===bjToday;}).length;
  var visitN=V.length;
  var invited=R.filter(function(r){return r.is_invited;}).length;

  var sub=document.getElementById('boardSub');
  sub.innerHTML='共 '+total+' 局 · '+nPlayers+' 位玩家 <span class="logout" id="logout">退出</span>';
  sub.querySelector('#logout').onclick=logout;

  var h='';

  // 1. 核心指标
  h+='<div class="panel"><h2>核心指标</h2><div class="kpi">'
    +box(total,'总答题局数')+box(nPlayers,'独立玩家')+box(todayN,'今日新增局')
    +box(visitN,'总访问')+box(invited,'被邀请来的局')
    +box(deadRate(R),'出局率')
    +'</div></div>';

  // 2. 称号分布
  h+='<div class="panel"><h2>🏆 结局称号分布</h2>'+distBars(R,'title')+'</div>';

  // 3. 风格分布
  h+='<div class="panel"><h2>🎭 投资风格分布</h2>'+distBars(R,'style')+'</div>';

  // 4. 分数分布
  h+='<div class="panel"><h2>📈 综合评分</h2>'+scoreStats(R)+'</div>';

  // 5. 排行榜
  h+='<div class="panel"><h2>🥇 最高分排行 Top 20</h2>'+leaderboard(R)+'</div>';

  // 6. 项目热度(从picks轨迹算)
  h+='<div class="panel"><h2>🎯 项目热度(被押注/踩雷)</h2>'+dealHeat(R)+'</div>';

  document.getElementById('content').innerHTML=h;
}

function box(n,l){return '<div class="box"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}
function deadRate(R){
  var withFlag=R.filter(function(r){return r.health_dead!=null;});
  if(!withFlag.length)return '—';
  var d=withFlag.filter(function(r){return r.health_dead;}).length;
  return (d/withFlag.length*100).toFixed(0)+'%';
}
function distBars(R,key){
  var cnt={}, tot=0;
  R.forEach(function(r){var v=r[key]; if(v){cnt[v]=(cnt[v]||0)+1;tot++;}});
  var arr=Object.keys(cnt).map(function(k){return [k,cnt[k]];}).sort(function(a,b){return b[1]-a[1];});
  if(!arr.length)return '<div class="loading">暂无数据</div>';
  return arr.map(function(x){
    var p=pct(x[1],tot);
    return '<div class="row"><div class="nm">'+esc(x[0])+'</div><div class="barwrap"><div class="bar" style="width:'+p+'%"></div></div><div class="pct">'+x[1]+' ('+p.toFixed(0)+'%)</div></div>';
  }).join('');
}
function scoreStats(R){
  var sc=R.map(function(r){return r.score;}).filter(function(s){return typeof s==='number';}).sort(function(a,b){return a-b;});
  if(!sc.length)return '<div class="loading">暂无数据</div>';
  var sum=sc.reduce(function(a,b){return a+b;},0);
  var q=function(p){return sc[Math.floor(sc.length*p)];};
  return '<div class="kpi">'
    +box(Math.round(sum/sc.length),'平均分')+box(q(0.5),'中位数')+box(sc[sc.length-1],'最高分')
    +box(q(0.1),'P10')+box(q(0.9),'P90')+box(sc[0],'最低分')+'</div>';
}
function leaderboard(R){
  var top=R.filter(function(r){return typeof r.score==='number';})
    .sort(function(a,b){return b.score-a.score;}).slice(0,20);
  if(!top.length)return '<div class="loading">暂无数据</div>';
  var rows=top.map(function(r,i){
    var rk=i<3?('<span class="rk g'+(i+1)+'">'+(i+1)+'</span>'):('<span class="rk">'+(i+1)+'</span>');
    return '<tr><td>'+rk+'</td><td>'+esc(r.player_name||'匿名')+'</td><td>'+esc(r.title||'')+'</td><td class="sc">'+r.score+'</td></tr>';
  }).join('');
  return '<table><tr><th>#</th><th>玩家</th><th>称号</th><th style="text-align:right">分数</th></tr>'+rows+'</table>';
}
function dealHeat(R){
  // 从 picks 轨迹统计:每个项目被选中次数 + 其中踩雷(C/B)次数
  var pick={}, bad={};
  R.forEach(function(r){
    var ps=r.picks; if(!Array.isArray(ps))return;
    ps.forEach(function(p){
      var name=p&&p.name; if(!name)return;
      pick[name]=(pick[name]||0)+1;
      if(p.tier==='C'||p.tier==='B') bad[name]=(bad[name]||0)+1;
    });
  });
  var arr=Object.keys(pick).map(function(k){return [k,pick[k],bad[k]||0];}).sort(function(a,b){return b[1]-a[1];}).slice(0,15);
  if(!arr.length)return '<div class="loading">暂无轨迹数据(需新版答题记录)</div>';
  var max=arr[0][1];
  return arr.map(function(x){
    var p=pct(x[1],max);
    var badR=x[1]?(x[2]/x[1]*100).toFixed(0):0;
    return '<div class="row"><div class="nm">'+esc(x[0])+'</div><div class="barwrap"><div class="bar" style="width:'+p+'%"></div></div><div class="pct">'+x[1]+'选/踩'+badR+'%</div></div>';
  }).join('');
}

// ---- 启动 ----
document.getElementById('loginBtn').onclick=doLogin;
document.getElementById('pin').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
if(!SB.url||!SB.key){
  document.getElementById('login').innerHTML='<h1>📊 数据看板</h1><div class="loading">未配置 Supabase,无法展示数据</div>';
}else if(loggedIn()){
  enter();
}
</script>
</body>
</html>
