<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据调试 · 平衡分布查看器</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{--bg:#f0ece2;--paper:#f5f1e8;--ink:#1a1714;--ink-soft:#4a443c;--ink-faint:#8c857a;--line:#d6cfc0;--gold:#b8860b;--good:#3c6b4f;--bad:#a8453a;}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);padding:24px 16px 60px;line-height:1.7;}
  .wrap{max-width:680px;margin:0 auto;}
  h1{font-family:"Kaiti SC","STKaiti",serif;font-weight:900;font-size:clamp(24px,5vw,36px);letter-spacing:.04em;text-align:center;margin-bottom:4px;}
  .sub{text-align:center;font-size:13px;color:var(--ink-faint);margin-bottom:8px;}
  .live{text-align:center;font-size:12px;color:var(--good);margin-bottom:22px;}
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:18px 20px;margin-bottom:16px;}
  .panel h2{font-size:15px;font-weight:800;letter-spacing:.05em;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--line);}
  .row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:13.5px;}
  .row .nm{flex:0 0 130px;font-weight:600;}
  .row .barwrap{flex:1;height:18px;background:rgba(26,23,20,.06);border-radius:4px;position:relative;overflow:hidden;}
  .row .bar{position:absolute;left:0;top:0;height:100%;border-radius:4px;transition:width .4s;}
  .row .pct{flex:0 0 110px;text-align:right;font-weight:800;font-variant-numeric:tabular-nums;font-size:12.5px;}
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  .stat{background:rgba(26,23,20,.03);border-radius:6px;padding:12px 14px;}
  .stat .k{font-size:12px;color:var(--ink-faint);margin-bottom:3px;}
  .stat .v{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;}
  .stat .v small{font-size:12px;color:var(--ink-soft);font-weight:600;}
  .note{font-size:12px;color:var(--ink-faint);margin-top:10px;line-height:1.6;}
  .footer{text-align:center;font-size:12px;color:var(--ink-faint);margin-top:24px;}
  .loading{text-align:center;padding:40px;color:var(--ink-faint);}
</style>
</head>
<body>
<div class="wrap">
  <h1>📊 数据调试 · 平衡分布</h1>
  <div class="sub">中国创业投资模拟器 · 实时读取游戏真实配置</div>
  <div class="live" id="live">⏳ 加载配置并模拟中…</div>
  <div id="content"></div>
  <div class="footer">🦞 小龙虾出品 · 只读分布查看器 · 数据=游戏真实配置（config.js/data-periods.js/data-endings.js）</div>
</div>

<!-- 直接引入游戏真实配置/数据,永不脱节 -->
<script src="config.js?v=20260623g"></script>
<script src="data-periods.js?v=20260623g"></script>
<script src="data-endings.js?v=20260623g"></script>
<script>
const RUNS=10000;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

// ===== 忠实复刻游戏逻辑(与 game.js 一致) =====
function rollOutcome(d,state){
  if(d.trend==='safe')return'A';
  const P=CONFIG.probability;
  const luckAdj=((state.luck-50)/50)*(CONFIG.luckEffect||0.3);
  const tb=(P.trendBoost&&P.trendBoost[d.trend])||0;
  let p=clamp(d.base+luckAdj+tb,0,1);
  const dice=Math.random();
  const perf=p*P.perfWeight.base+(1-dice)*P.perfWeight.dice;
  if(perf>=P.tierCuts.SS)return'SS';
  if(perf>=P.tierCuts.S)return'S';
  if(perf>=P.tierCuts.A)return'A';
  if(perf>=P.tierCuts.B)return'B';
  return'C';
}
function gateLock(deals,state,pi,ri){
  let g=deals.map((d,i)=>{
    const gt=d.gate; if(!gt)return 0;
    if(gt.type==='aum')return state.aum<gt.min?'aum':0;
    if(gt.type==='track')return state.track<gt.min?'track':0;
    if(gt.type==='health')return state.health<gt.min?'health':0;
    return 0;
  });
  if(g.every(x=>x)){let m=1e9,u=0;deals.forEach((d,i)=>{const mn=(d.gate&&d.gate.min)||0;if(mn<m){m=mn;u=i;}});g[u]=0;}
  return g;
}
function calcScore(state){
  const C=CONFIG.scoreCoef;
  const aN=Math.max(0,(state.aum||0)-100-(state.spent||0));
  const bN=Math.max(0,(state.track||0)-100);
  const cN=Math.max(0,(state.network||0)-100);
  let s=aN*C.a+bN*C.b+cN*C.c;
  if(state.health<=0)s*=CONFIG.deadPenalty;
  return Math.round(Math.max(0,Math.min(CONFIG.scoreClampMax||1000,s)));
}
function pickEnding(score,state){
  const dead=state.health<=0;
  if(dead && state.track<CONFIG.healthDeath.earlyOutTrackCap) return 'earlyout';
  let key='exit';
  for(const t of DATA_ENDINGS.endingTiers){ if(score>=t.min){key=t.key;break;} }
  return key;
}
// 玩家策略:4种混合(贪心/稳健/追风口/随机)
function pickDeal(deals,state,strat,pi,ri){
  const gl=gateLock(deals,state,pi,ri);
  let cand=deals.map((d,i)=>({d,i})).filter(x=>!gl[x.i]);
  if(!cand.length)cand=[{d:deals[0],i:0}];
  let pk;
  if(strat==='greedy')pk=cand.reduce((a,b)=>b.d.w.aum>a.d.w.aum?b:a);
  else if(strat==='safe')pk=cand.reduce((a,b)=>b.d.base>a.d.base?b:a);
  else if(strat==='trend')pk=cand.find(x=>x.d.trend==='hot')||cand[0];
  else pk=cand[Math.floor(Math.random()*cand.length)];
  return pk.d;
}
function play(strat){
  let state=Object.assign({},CONFIG.start,{spent:0});
  let up=0; let lock={aum:0,track:0,health:0};
  const periods=DATA_PERIODS.periods;
  for(let pi=0;pi<periods.length;pi++){
    const p=periods[pi];
    for(let ri=0;ri<p.rounds.length;ri++){
      if(state.health<=0) break;
      const r=p.rounds[ri];
      gateLock(r.deals,state,pi,ri).forEach(x=>{if(x)lock[x]++;});
      const d=pickDeal(r.deals,state,strat,pi,ri);
      const sm=(d.amt||0)>state.aum;
      state.spent+=(d.amt||0);
      const tier=rollOutcome(d,state);
      const tm=CONFIG.outcomeTiers[tier];
      const TR=CONFIG.trendReturn; let tg=1;
      if(tm.mult>0){ if(d.trend==='up')tg=Math.max(TR.upFloor,Math.pow(TR.upDecay,up)); else if(d.trend==='hot'||d.trend==='down')tg=TR.hotGain; }
      if(d.trend==='up')up++;
      const sf=sm?CONFIG.smallTicketFactor:1;
      const eff=tm.mult*tg*sf;
      state.aum=Math.max(0,state.aum+Math.round(d.w.aum*eff));
      state.track=Math.max(0,state.track+Math.round(d.w.track*eff));
      state.network=Math.max(0,state.network+Math.round((d.w.net||0)*Math.max(0.3,eff>0?eff:0.3)*sf));
      state.luck=clamp(state.luck+(CONFIG.luckDelta[tier]||0),0,100);
      const HC=CONFIG.health;
      let dh=-(HC.baseDecay+pi*HC.rampPerPeriod);
      if(tier==='C')dh-=HC.extraOnVeryBad; else if(tier==='B')dh-=HC.extraOnBad; else if(tier==='SS')dh+=HC.bonusOnGreat;
      state.health=clamp(state.health+dh,0,100);
    }
    if(state.health<=0) break;
  }
  const score=calcScore(state);
  return {score, ending:pickEnding(score,state), dead:state.health<=0, state:{...state}, lock};
}

function run(){
  const strats=['greedy','safe','trend','random'];
  const endCnt={}; const order=['legend','master','veteran','steady','rollercoaster','exit','earlyout'];
  const nm={legend:'👑 封神级',master:'🌟 一线传奇',veteran:'💼 资深合伙人',steady:'⚖️ 稳进玩家',rollercoaster:'🎢 过山车',exit:'📉 离场',earlyout:'🏥 健康透支'};
  order.forEach(k=>endCnt[k]=0);
  const scores=[]; const attr={aum:[],track:[],network:[],health:[],luck:[]};
  let dead=0; const lock={aum:0,track:0,health:0};
  for(let i=0;i<RUNS;i++){
    const r=play(strats[i%4]);
    endCnt[r.ending]++; scores.push(r.score);
    for(const k in attr)attr[k].push(r.state[k]);
    if(r.dead)dead++;
    lock.aum+=r.lock.aum; lock.track+=r.lock.track; lock.health+=r.lock.health;
  }
  scores.sort((a,b)=>a-b);
  for(const k in attr)attr[k].sort((a,b)=>a-b);
  const q=(arr,p)=>arr[Math.floor(arr.length*p)];
  const endColor={legend:'#b8860b',master:'#2c5282',veteran:'#3c6b4f',steady:'#5a6470',rollercoaster:'#9a7b3a',exit:'#a8453a',earlyout:'#7d5a3a'};
  const tierMin={};DATA_ENDINGS.endingTiers.forEach(t=>tierMin[t.key]=t.min);

  let html='';
  // 1. 结局分布
  html+='<div class="panel"><h2>🏆 结局称号分布</h2>';
  order.forEach(k=>{
    const c=endCnt[k], pct=(c/RUNS*100);
    const cut=tierMin[k]!==undefined?('≥'+tierMin[k]):'特殊';
    html+=`<div class="row"><div class="nm">${nm[k]}</div><div class="barwrap"><div class="bar" style="width:${Math.min(100,pct*2.5)}%;background:${endColor[k]}"></div></div><div class="pct">${pct.toFixed(1)}% <small style="color:#8c857a">${cut}</small></div></div>`;
  });
  html+='</div>';
  // 2. 综合评分分布
  html+='<div class="panel"><h2>📈 综合评分分布</h2><div class="stat-grid">';
  html+=`<div class="stat"><div class="k">平均分</div><div class="v">${Math.round(scores.reduce((a,b)=>a+b,0)/RUNS)}</div></div>`;
  html+=`<div class="stat"><div class="k">中位数</div><div class="v">${q(scores,0.5)}</div></div>`;
  html+=`<div class="stat"><div class="k">最高 / 最低</div><div class="v">${scores[RUNS-1]} <small>/ ${scores[0]}</small></div></div>`;
  html+=`<div class="stat"><div class="k">P10 / P90</div><div class="v">${q(scores,0.1)} <small>/ ${q(scores,0.9)}</small></div></div>`;
  html+='</div></div>';
  // 3. 各属性终局分布
  html+='<div class="panel"><h2>📊 各属性终局值（中位/P90/最高）</h2><div class="stat-grid">';
  const an={aum:'💰 资本',track:'🏆 业绩',network:'🤝 人脉',health:'❤️ 健康',luck:'🍀 运气'};
  ['track','aum','network','health','luck'].forEach(k=>{
    html+=`<div class="stat"><div class="k">${an[k]}</div><div class="v">${q(attr[k],0.5)} <small>/ ${q(attr[k],0.9)} / ${attr[k][RUNS-1]}</small></div></div>`;
  });
  html+='</div></div>';
  // 4. 健康出局 + 门槛
  const tot=lock.aum+lock.track+lock.health;
  html+='<div class="panel"><h2>🔒 健康出局 & 门槛触发</h2><div class="stat-grid">';
  html+=`<div class="stat"><div class="k">健康出局率</div><div class="v">${(dead/RUNS*100).toFixed(1)}%</div></div>`;
  html+=`<div class="stat"><div class="k">三门槛触发占比</div><div class="v" style="font-size:13px">资本${(lock.aum/tot*100).toFixed(0)}% 业绩${(lock.track/tot*100).toFixed(0)}% 健康${(lock.health/tot*100).toFixed(0)}%</div></div>`;
  html+='</div></div>';
  // 5. 关键参数速览
  const C=CONFIG;
  html+='<div class="panel"><h2>⚙️ 当前关键参数</h2><div class="note">';
  html+=`评分系数 资本${C.scoreCoef.a}/业绩${C.scoreCoef.b}/人脉${C.scoreCoef.c}（2:3:1）<br>`;
  html+=`起始值 资本${C.start.aum}/业绩${C.start.track}/人脉${C.start.network}/运气${C.start.luck}/健康${C.start.health}<br>`;
  html+=`档位倍率 SS${C.outcomeTiers.SS.mult}/S${C.outcomeTiers.S.mult}/A${C.outcomeTiers.A.mult}/B${C.outcomeTiers.B.mult}/C${C.outcomeTiers.C.mult}<br>`;
  html+=`健康衰减 基础${C.health.baseDecay}+时代×${C.health.rampPerPeriod}，B档-${C.health.extraOnBad}/C档-${C.health.extraOnVeryBad}<br>`;
  html+=`运气影响胜率 ±${C.luckEffect}，结局档线 ${DATA_ENDINGS.endingTiers.filter(t=>t.min>0).map(t=>t.min).join('/')}`;
  html+='</div></div>';

  document.getElementById('content').innerHTML=html;
  document.getElementById('live').textContent='✅ 已读取真实配置 · 模拟 '+RUNS+' 局（4策略混合）· 数据实时';
}
// 等配置加载
setTimeout(()=>{
  if(typeof CONFIG==='undefined'||typeof DATA_PERIODS==='undefined'){
    document.getElementById('live').textContent='❌ 配置加载失败';
    return;
  }
  try{ run(); }catch(e){ document.getElementById('live').textContent='❌ 模拟出错: '+e.message; console.error(e); }
},100);
</script>
</body>
</html>
