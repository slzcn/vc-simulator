<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f3eada">
<title>中国创业投资模拟器</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<link rel="stylesheet" href="style.css?v=20260622ac">
</head>
<body>
<div class="wrap">

  <div id="cover" class="screen">
    <div class="invite-banner" id="inviteBanner"></div>
    <div class="years" id="coverYears"></div>
    <h1 id="coverH1"></h1>
    <div class="sub" id="coverSub"></div>
    <div class="rules" id="coverRules"></div>
    <div class="cover-btns" id="coverBtns"></div>
    <div class="cover-stats" id="coverStats"></div>
    <div class="credit" id="coverCredit"></div>
  </div>
  <button class="info-btn" id="infoBtn" onclick="toggleTip()" title="了解玩法" aria-label="了解玩法"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="11" x2="12" y2="16"/><circle cx="12" cy="8" r="0.6" fill="currentColor"/></svg></button>
  <div id="tipMask" class="tip-mask hidden" onclick="closeTip(event)"><div class="tip-panel" id="tipPanel"></div></div>

  <div id="periodIntro" class="screen hidden"></div>

  <div id="game" class="screen hidden">
    <div class="period-progress" id="periodProgress"></div>
    <div class="topbar">
      <div class="left">
        <span class="era-pill" id="eraPill">2000 · 互联网泡沫顶点</span>
        <span class="round-no">第 <b id="roundNo">1</b>/<span id="roundTotal">20</span> 站</span>
      </div>
      <div class="right">
        <span class="title-now" id="titleNow">投资分析师</span>
      </div>
    </div>
    <div class="stats">
      <div class="stat aum"><div class="row"><span class="nm">资本 <em>AUM</em></span><span class="vl"><span id="vAum">100</span><span id="dAum"></span></span></div><div class="bar"><i id="bAum"></i></div></div>
      <div class="stat track"><div class="row"><span class="nm">业绩 <em>FAME</em></span><span class="vl"><span id="vTrack">0</span><span id="dTrack"></span></span></div><div class="bar"><i id="bTrack"></i></div></div>
      <div class="stat net"><div class="row"><span class="nm">人脉 <em>NET</em></span><span class="vl"><span id="vNet">20</span><span id="dNet"></span></span></div><div class="bar"><i id="bNet"></i></div></div>
      <div class="stat luck"><div class="row"><span class="nm">运气 <em>LUCK</em></span><span class="vl"><span id="vLuck">50</span><span id="dLuck"></span></span></div><div class="bar"><i id="bLuck"></i></div></div>
      <div class="stat health"><div class="row"><span class="nm">健康 <em>HP</em></span><span class="vl"><span id="vHealth">100</span><span id="dHealth"></span></span></div><div class="bar"><i id="bHealth"></i></div></div>
    </div>
    <div id="content"></div>
  </div>

  <div id="ending" class="screen hidden"></div>
  <div class="img-modal" id="imgModal"><span class="close-x" onclick="closeImg()">×</span><div class="tip" id="imgTip"></div><img id="imgOut"/></div>
  <button class="music-btn" id="musicBtn" onclick="toggleMusic()" title="背景音乐" aria-label="背景音乐开关" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg></button>
  <div class="toast" id="toast"></div>
</div>

<!-- 配置 + 数据(可独立修改) -->
<script src="config.js?v=20260622ac"></script>
<script src="data-periods.js?v=20260622ac"></script>
<script src="data-endings.js?v=20260622ac"></script>
<script src="data-mbti.js?v=20260622ac"></script>
<!-- 引擎 -->
<script src="engine-music.js?v=20260622ac"></script>
<script src="engine-sfx.js?v=20260622ac"></script>
<script src="game.js?v=20260622ac"></script>
</body>
</html>
