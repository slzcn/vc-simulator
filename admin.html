<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>中国创业投资模拟器 · 后台</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#f0ece2;--paper:#f5f1e8;--ink:#1a1714;--ink-soft:#4a443c;--ink-faint:#8c857a;
    --line:#d6cfc0;--good:#3c6b4f;--bad:#a8453a;--warn:#9a7b3a;--card:#faf7ef;
    --gold:#b8860b;--blue:#3a6b8c;--accent:#8a5a3a;
  }
  html,body{background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Songti SC",serif;
    line-height:1.7;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;}
  body{padding:18px 0 44px;min-height:100vh;min-height:100dvh;}
  .wrap{max-width:860px;margin:0 auto;padding:0 20px;
    padding-left:max(20px,env(safe-area-inset-left));padding-right:max(20px,env(safe-area-inset-right));
    padding-top:env(safe-area-inset-top);padding-bottom:max(20px,env(safe-area-inset-bottom));}

  /* ── 顶部 ── */
  /* 首页大气hero区 */
  .hero{text-align:center;padding:30px 20px 24px;background:linear-gradient(180deg,rgba(212,175,55,.07) 0%,rgba(212,175,55,.01) 60%,transparent 100%);border-radius:16px;margin-bottom:22px;border:1px solid rgba(212,175,55,.14);position:relative;overflow:hidden;}
  .hero::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:64px;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:0 0 3px 3px;}
  .hero-name{font-family:"Kaiti SC","STKaiti","Songti SC",serif;font-weight:900;font-size:clamp(17px,4vw,21px);letter-spacing:.18em;color:var(--gold);margin-bottom:7px;text-shadow:0 1px 2px rgba(212,175,55,.14);}
  .hero-title{font-family:"Kaiti SC","STKaiti","Songti SC",serif;font-weight:900;font-size:clamp(27px,6.2vw,40px);letter-spacing:.08em;margin:0 0 10px;color:var(--ink);text-shadow:0 2px 4px rgba(26,23,20,.07);line-height:1.15;}
  .hero-sub{font-size:clamp(12px,2.9vw,14px);color:var(--ink-faint);letter-spacing:.04em;font-weight:500;}
  .logout{position:absolute;top:14px;right:14px;color:var(--accent);cursor:pointer;font-size:12px;font-weight:600;letter-spacing:.04em;display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:999px;border:1px solid color-mix(in srgb,var(--accent) 38%,transparent);background:color-mix(in srgb,var(--accent) 9%,transparent);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);transition:all .22s cubic-bezier(.4,0,.2,1);box-shadow:0 0 0 0 color-mix(in srgb,var(--accent) 40%,transparent);}
  .logout::before{content:"⏻";font-size:13px;line-height:1;}
  @media(hover:hover){.logout:hover{color:var(--paper);background:var(--accent);border-color:var(--accent);box-shadow:0 0 16px -2px color-mix(in srgb,var(--accent) 65%,transparent),0 0 0 3px color-mix(in srgb,var(--accent) 18%,transparent);transform:translateY(-1px);}}
  .logout:active{transform:translateY(0);}
  @media(min-width:768px){.hero{padding:44px 32px 32px;}.hero-title{font-size:40px;}.hero-name{font-size:21px;}}

  /* ── Tab 导航 ── */
  .tabs{display:flex;gap:6px;margin-bottom:18px;position:sticky;top:0;
    background:linear-gradient(var(--paper) 80%,rgba(245,241,232,0));padding:10px 0 12px;z-index:20;flex-wrap:wrap;}
  .tab{flex:1 1 auto;min-width:72px;text-align:center;padding:10px 4px;font-size:clamp(12px,3vw,13.5px);font-weight:700;
    border:1.5px solid var(--line);border-radius:9px;cursor:pointer;background:var(--card);color:var(--ink-soft);
    transition:all .2s;user-select:none;-webkit-user-select:none;letter-spacing:.02em;touch-action:manipulation;}
  @media(hover:hover){.tab:hover{border-color:var(--accent);color:var(--accent);}}
  .tab.on{background:var(--accent);color:var(--paper);border-color:var(--accent);box-shadow:0 4px 14px color-mix(in srgb,var(--accent) 32%,transparent);}
  .page{display:none;animation:fade .35s ease;}
  .page.on{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* ── 通用面板/卡片(三页统一) ── */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(26,23,20,.04);}
  .panel h2{font-size:clamp(14px,3.6vw,15.5px);font-weight:800;letter-spacing:.04em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;}
  .panel h2 .hint{font-size:11px;color:var(--ink-faint);font-weight:600;}
  .loading{text-align:center;color:var(--ink-faint);padding:30px;}
  .note{font-size:11.5px;color:var(--ink-faint);margin-top:9px;line-height:1.65;}

  /* 横条统计(称号/风格/趋势分布等,stats+tune 共用) */
  .row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:clamp(12px,3vw,13px);}
  .row .nm{flex:0 0 clamp(72px,22vw,150px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;}
  .row .e{flex:0 0 18px;text-align:center;font-size:15px;}
  .row .barwrap{flex:1;min-width:40px;height:17px;background:rgba(26,23,20,.06);border-radius:5px;position:relative;overflow:hidden;}
  .row .bar{position:absolute;left:0;top:0;height:100%;border-radius:5px;background:var(--accent);transition:width .4s;min-width:2px;}
  /* ── UX增强(借鉴echarts错落入场,纯CSS,2026-06-30) ── */
  /* 柱条:插入时宽度先归0,加.fill后逐条延迟展开到--w目标宽 */
  .row .bar.anim{width:0!important;transition:width .7s cubic-bezier(.22,.61,.36,1);}
  .row .bar.anim.fill{width:var(--w)!important;}
  /* KPI数字滚动时的细微强调 */
  .kpi .box .n{transition:color .3s;}
  /* 面板入场:依次淡入上浮 */
  .panel.reveal{opacity:0;transform:translateY(14px);}
  .panel.reveal.in{opacity:1;transform:none;transition:opacity .5s ease,transform .5s cubic-bezier(.22,.61,.36,1);}
  @media(prefers-reduced-motion:reduce){
    .row .bar.anim,.row .bar.anim.fill{transition:none;width:var(--w)!important;}
    .panel.reveal{opacity:1!important;transform:none!important;}
  }
  .row .pct{flex:0 0 clamp(78px,20vw,120px);text-align:right;font-weight:800;font-variant-numeric:tabular-nums;font-size:12px;color:var(--ink-soft);}
  .row .pct small{color:var(--ink-faint);font-weight:600;}
  .pct-val{color:var(--accent);font-weight:800;font-size:13px;}
  .pct-sub{color:var(--ink-faint);font-weight:600;font-size:11px;margin-left:5px;padding:1px 5px;background:rgba(138,90,58,.07);border-radius:5px;}
  /* 项目热度踩雷警示色（暂留，跳色问题以下面为准） */

  /* 🥧 环形饼图(结局称号分布) v2 */
  .pieWrap{display:flex;gap:22px;align-items:center;flex-wrap:wrap;justify-content:center;padding:6px 0;}
  .pieSvg{flex:0 0 auto;width:min(220px,62vw);height:auto;aspect-ratio:1/1;max-width:240px;filter:drop-shadow(0 6px 14px rgba(26,23,20,.08));}
  .pieSvg .seg{cursor:pointer;transition:transform .28s cubic-bezier(.34,1.56,.64,1),opacity .22s,filter .22s;transform-origin:center;transform-box:fill-box;}
  @media(hover:hover){.pieSvg .seg:hover{filter:brightness(1.1) drop-shadow(0 4px 10px rgba(26,23,20,.28));}}
  .pieSvg.dim .seg{opacity:.25;}
  .pieSvg.dim .seg.act{opacity:1;}
  .pieCenter .c-emoji{font-size:36px;line-height:1;}
  .pieCenter .c-name{font-size:14px;font-weight:800;fill:var(--ink-soft);letter-spacing:.04em;}
  .pieCenter .c-pct{font-size:28px;font-weight:900;fill:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:.02em;}
  .pieCenter .c-cnt{font-size:12px;font-weight:700;fill:var(--ink-faint);font-variant-numeric:tabular-nums;}
  .pieLegend{flex:1 1 240px;min-width:180px;display:flex;flex-direction:column;gap:4px;}
  .pieLegend .lg{display:flex;align-items:center;gap:9px;padding:6px 10px;border-radius:9px;cursor:pointer;transition:background .2s,transform .2s,box-shadow .2s;border:1px solid transparent;}
  .pieLegend .lg.act{background:rgba(138,90,58,.07);border-color:rgba(138,90,58,.18);transform:translateX(3px);box-shadow:0 2px 6px rgba(26,23,20,.06);}
  @media(hover:hover){.pieLegend .lg:hover{background:rgba(138,90,58,.07);border-color:rgba(138,90,58,.18);transform:translateX(3px);box-shadow:0 2px 6px rgba(26,23,20,.06);}}
  .pieLegend .dot{flex:0 0 12px;width:12px;height:12px;border-radius:3px;box-shadow:0 1px 2px rgba(26,23,20,.22),inset 0 1px 0 rgba(255,255,255,.25);}
  .pieLegend .lg-nm{flex:0 0 40%;font-size:13px;font-weight:700;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em;min-width:0;}
  .pieLegend .lg-nm .lg-emo{margin-right:4px;}
  .pieLegend .lg-bar{flex:1 1 20px;min-width:14px;height:5px;background:rgba(26,23,20,.06);border-radius:3px;overflow:hidden;position:relative;margin:0 4px;}
  .pieLegend .lg-bar i{position:absolute;left:0;top:0;height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}
  .pieLegend .lg-val{font-size:12.5px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;min-width:36px;text-align:right;}
  .pieLegend .lg-pct{font-size:11.5px;font-weight:700;color:var(--ink-faint);min-width:42px;text-align:right;font-variant-numeric:tabular-nums;background:rgba(26,23,20,.04);padding:1px 5px;border-radius:5px;}

  /* KPI 网格(stats 核心指标 / scoreStats) */
  .kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .kpi .box{background:rgba(26,23,20,.03);border-radius:9px;padding:14px 8px;text-align:center;}
  .kpi .n{font-size:clamp(20px,5vw,26px);font-weight:900;color:var(--accent);font-variant-numeric:tabular-nums;}
  .kpi .l{font-size:11.5px;color:var(--ink-faint);margin-top:3px;}

  /* stat 双列网格(tune 分布统计) */
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .stat{background:rgba(26,23,20,.03);border-radius:8px;padding:10px 12px;}
  .stat .k{font-size:11.5px;color:var(--ink-faint);margin-bottom:2px;}
  .stat .v{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;}
  .stat .v small{font-size:11.5px;color:var(--ink-soft);font-weight:600;}

  /* 排行榜表格(stats) + 定义表(doc/cfg) */
  table{width:100%;border-collapse:collapse;font-size:clamp(12px,3vw,13px);}
  th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;}
  th{font-size:11.5px;color:var(--ink-faint);font-weight:700;}
  td.sc{text-align:right;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;}
  .rk{display:inline-flex;width:20px;justify-content:center;font-weight:800;}
  .rk.g1{color:#d4af37;}.rk.g2{color:#9aa0a6;}.rk.g3{color:#c77b3a;}
  .deftbl td:first-child{font-weight:700;color:var(--blue);width:30%;max-width:120px;word-break:break-word;overflow-wrap:anywhere;}
  .deftbl tr:last-child td{border-bottom:none;}

  /* 公式/文案块(doc+cfg) */
  .formula{background:rgba(26,23,20,.045);border-left:3px solid var(--accent);border-radius:0 7px 7px 0;padding:11px 14px;margin:8px 0;font-size:clamp(12px,3vw,13px);line-height:1.95;font-family:"SF Mono",Menlo,Consolas,monospace;color:var(--ink);overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:pre-wrap;word-break:break-word;}
.gate-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.gate-item{display:flex;align-items:center;gap:8px;background:rgba(26,23,20,.04);border-radius:9px;padding:10px 12px;}
.gate-ic{font-size:18px;flex:0 0 auto;}
.gate-nm{flex:1;font-weight:600;font-size:13px;line-height:1.2;display:flex;flex-direction:column;}
.gate-nm i{font-style:normal;font-size:10px;color:#a39b8e;font-weight:500;font-family:"SF Mono",Menlo,monospace;}
.gate-n{flex:0 0 auto;font-weight:800;font-size:15px;color:var(--accent,#b8860b);font-variant-numeric:tabular-nums;}
.invest-rule{background:color-mix(in srgb,var(--warn) 8%,transparent);border-radius:10px;padding:11px 13px;border:1px solid color-mix(in srgb,var(--warn) 22%,transparent);}
.ir-h{font-weight:700;font-size:13px;margin-bottom:8px;color:#8a6d1b;}
.ir-row{display:flex;align-items:center;gap:9px;font-size:13px;margin:5px 0;}
.ir-cond{font-weight:600;flex:0 0 auto;font-variant-numeric:tabular-nums;}
.ir-arr{color:#b8860b;font-weight:800;}
.ir-res{color:var(--ink-soft,#6b6358);}
.ir-res.ok{color:#2e7d32;font-weight:600;}
  .txt{font-size:clamp(12px,3vw,13px);color:var(--ink-soft);line-height:1.8;}
  .txt b{color:var(--ink);}
  code{font-family:"SF Mono",Menlo,Consolas,monospace;font-size:.92em;background:rgba(26,23,20,.06);padding:1px 5px;border-radius:4px;}
  .pgrp-t{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.05em;border-bottom:1px dashed var(--line);padding-bottom:5px;margin-bottom:11px;margin-top:14px;}

  /* 调参滑块(tune) */
  .prow{display:flex;align-items:center;gap:10px;margin-bottom:11px;font-size:12.5px;flex-wrap:wrap;}
  .prow label{flex:0 0 clamp(96px,26vw,130px);color:var(--ink-soft);}
  .prow input[type=range]{flex:1;min-width:90px;height:24px;accent-color:var(--accent);background:transparent;cursor:pointer;-webkit-appearance:none;appearance:none;touch-action:manipulation;}
  .prow input[type=range]:focus{outline:none;}
  .prow input[type=range]::-webkit-slider-runnable-track{height:5px;border-radius:3px;background:rgba(26,23,20,.14);}
  .prow input[type=range]::-moz-range-track{height:5px;border-radius:3px;background:rgba(26,23,20,.14);}
  .prow input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);border:2px solid var(--paper);box-shadow:0 1px 3px rgba(0,0,0,.25);margin-top:-7px;cursor:pointer;}
  .prow input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--accent);border:2px solid var(--paper);box-shadow:0 1px 3px rgba(0,0,0,.25);cursor:pointer;}
  .prow .pv input{width:64px;text-align:right;font-family:inherit;font-size:13px;font-weight:800;border:1px solid var(--line);border-radius:5px;padding:5px 6px;background:#fff;color:var(--ink);-webkit-appearance:none;appearance:none;-moz-appearance:textfield;}
  .prow .pv input::-webkit-outer-spin-button,.prow .pv input::-webkit-inner-spin-button{-webkit-appearance:none;appearance:none;margin:0;display:none;}
  .prow .pv input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 22%,transparent);}
  .btnrow{display:flex;gap:10px;margin-top:10px;}
  .btn{flex:1;border:1.5px solid var(--accent);background:transparent;color:var(--accent);font-family:inherit;font-size:13.5px;font-weight:700;padding:12px 0;cursor:pointer;border-radius:7px;letter-spacing:.05em;transition:all .15s;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
  .btn:active{transform:scale(.97);background:var(--accent);color:var(--paper);}
  @media(hover:hover){.btn:hover{background:var(--accent);color:var(--paper);transform:translateY(-2px);box-shadow:0 6px 18px color-mix(in srgb,var(--accent) 32%,transparent);}.btn.reset:hover{background:var(--bad);color:#fff;border-color:var(--bad);box-shadow:0 6px 18px color-mix(in srgb,var(--bad) 30%,transparent);}}
  .btn.reset{border-color:var(--bad);color:var(--bad);}
  .btn.reset:active{background:var(--bad);color:#fff;}
  .live{text-align:center;font-size:12px;color:var(--good);margin:10px 0;font-weight:600;}
  .dirty{color:var(--bad);font-size:11px;font-weight:700;}

  /* 音效行(sfx) */
  #sfxPanel .srow{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);border-radius:8px;background:var(--card);padding:12px 15px;margin-bottom:9px;cursor:pointer;transition:all .18s ease;}
  @media(hover:hover){#sfxPanel .srow:hover{border-color:var(--accent);transform:translateX(3px);box-shadow:0 4px 14px color-mix(in srgb,var(--accent) 14%,transparent);}}
  #sfxPanel .srow:active{transform:scale(.98);}
  #sfxPanel .play{position:relative;width:34px;height:34px;flex:0 0 34px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;transition:background .2s,box-shadow .2s,transform .1s;}
  #sfxPanel .play:active{transform:scale(.92);}
  #sfxPanel .play::before{content:'';display:block;width:0;height:0;border-style:solid;border-width:7px 0 7px 12px;border-color:transparent transparent transparent #fff;margin-left:3px;transition:.15s;}
  #sfxPanel .srow.playing .play{background:var(--good);animation:pulse 1.6s infinite;}
  #sfxPanel .srow.playing .play::before{border-width:0;width:11px;height:13px;margin-left:0;border-left:3.5px solid #fff;border-right:3.5px solid #fff;background:transparent;box-sizing:border-box;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(60,107,79,.45);}70%{box-shadow:0 0 0 9px rgba(60,107,79,0);}100%{box-shadow:0 0 0 0 rgba(60,107,79,0);}}
  #sfxPanel .srow.playing{background:rgba(60,107,79,.08);}
  #sfxPanel .wave{display:none;gap:2px;align-items:flex-end;height:14px;margin-left:auto;flex:0 0 auto;padding-right:2px;}
  #sfxPanel .srow.playing .wave{display:flex;}
  #sfxPanel .wave span{width:2.5px;background:var(--good);border-radius:2px;animation:wv .8s ease-in-out infinite;}
  #sfxPanel .wave span:nth-child(1){animation-delay:0s;}#sfxPanel .wave span:nth-child(2){animation-delay:.2s;}#sfxPanel .wave span:nth-child(3){animation-delay:.4s;}#sfxPanel .wave span:nth-child(4){animation-delay:.15s;}
  @keyframes wv{0%,100%{height:4px;}50%{height:14px;}}
  #sfxPanel .info{flex:1;min-width:0;}
  #sfxPanel .nm2{font-size:14.5px;font-weight:700;margin-bottom:2px;}
  #sfxPanel .ds{font-size:12px;color:var(--ink-faint);line-height:1.5;}
  #sfxPanel .grp-t{font-size:12.5px;font-weight:800;letter-spacing:.1em;color:var(--accent);margin:20px 0 11px;padding-bottom:6px;border-bottom:1px solid var(--line);}

  .footer{text-align:center;font-size:11.5px;color:var(--ink-faint);margin-top:18px;padding-top:16px;border-top:1px solid var(--line);line-height:1.7;}

  @media(max-width:480px){
    .panel{padding:14px 14px;}
    .prow{gap:8px;}
    .prow label{flex:1 1 100%;font-weight:600;color:var(--ink);margin-bottom:-2px;}
    .stat-grid,.kpi{gap:8px;}
    .kpi{grid-template-columns:repeat(3,1fr);}
    /* 称号分布图例:小屏隐藏迷你进度条+压缩间距,称号缩字号单行显示(尽量不折行) */
    .pieLegend .lg-bar{display:none;}
    .pieLegend .lg{gap:6px;padding:6px 6px;}
    .pieLegend .lg-nm{flex:1 1 auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11.5px;letter-spacing:0;}
    .pieLegend .lg-nm .lg-emo{margin-right:2px;}
    .pieLegend .lg-val{min-width:24px;font-size:11.5px;}
    .pieLegend .lg-pct{min-width:0;font-size:10.5px;padding:1px 4px;}
  }

  /* ── 登录门 ── */
  #authGate{position:fixed;inset:0;z-index:9999;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  #authGate .agt{font-size:18px;font-weight:800;margin-bottom:6px;}
  #authGate .ags{font-size:12.5px;color:var(--ink-faint);margin-bottom:16px;text-align:center;}
  #authPin{width:240px;max-width:80vw;font-size:18px;text-align:center;letter-spacing:.3em;padding:12px;border:1.5px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);transition:border-color .18s,box-shadow .18s;}
  #authPin:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent);}

<script>
"use strict";
/* ===================== 公共 ===================== */
var AUTH_KEY='dash_auth_ts_vc', AUTH_TTL=2*3600*1000;
var SB=(typeof CONFIG!=='undefined'&&CONFIG.supabase)||{};
function esc(s){return String(s==null?'':s).replace(/[&<>"'`]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','`':'&#96;'}[c];});}
function showBr(s){return esc(s).replace(/&lt;br\s*\/?&gt;/gi,' ⏎ ').replace(/&lt;b&gt;/gi,'').replace(/&lt;\/b&gt;/gi,'');}
function pct(n,t){return t?(n/t*100):0;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function tierMin(k){return (DATA_ENDINGS.endingTiers.find(function(t){return t.key===k;})||{}).min||0;}

/* ===================== 🥧 通用环形饼图 v2 ===================== */
/* data: [{label,value,color,emoji}]  鼠标划过扇区/图例联动高亮,中心显示详情 */
var _pieSeq=0;
function donutChart(data){
  data=(data||[]).filter(function(d){return d.value>0;});
  if(!data.length)return '<div class="loading">暂无数据</div>';
  var tot=data.reduce(function(a,b){return a+b.value;},0);
  var id='pie'+(++_pieSeq);
  var R=108,r=66,cx=120,cy=120;        // 外半径/内半径/中心 (较之前锦大)
  function pt(cxx,cyy,rad,ang){var a=(ang-90)*Math.PI/180;return [cxx+rad*Math.cos(a),cyy+rad*Math.sin(a)];}
  function arcPath(a0,a1){
    var so=pt(cx,cy,R,a0), eo=pt(cx,cy,R,a1);
    var si=pt(cx,cy,r,a1), ei=pt(cx,cy,r,a0);
    var large=(a1-a0)>180?1:0;
    return 'M '+so[0].toFixed(2)+' '+so[1].toFixed(2)+
           ' A '+R+' '+R+' 0 '+large+' 1 '+eo[0].toFixed(2)+' '+eo[1].toFixed(2)+
           ' L '+si[0].toFixed(2)+' '+si[1].toFixed(2)+
           ' A '+r+' '+r+' 0 '+large+' 0 '+ei[0].toFixed(2)+' '+ei[1].toFixed(2)+' Z';
  }
  var gap=0.6;                          // 扇区间隙(度),轮廓更清爽
  var ang=0,segs='',meta=[],maxIdx=0,maxV=0;
  data.forEach(function(d,i){
    var sweep=d.value/tot*360, a0=ang, a1=ang+sweep; ang=a1;
    var pp=(d.value/tot*100);
    if(d.value>maxV){maxV=d.value;maxIdx=i;}
    // 扇区中心角→外推位移方向(加到 8px)
    var mid=(a0+a1)/2, off=pt(0,0,8,mid);
    var a0g=a0+gap/2, a1g=Math.max(a0g+0.1,a1-gap/2);
    segs+='<path class="seg" d="'+arcPath(a0g,a1g)+'" fill="'+(d.color||'var(--accent)')+'" data-i="'+i+'"'+
          ' style="--ox:'+off[0].toFixed(2)+'px;--oy:'+off[1].toFixed(2)+'px"'+
          ' onmouseenter="pieHover(\''+id+'\','+i+')" onmouseleave="pieHover(\''+id+'\',-1)" onclick="pieClick(\''+id+'\','+i+')"></path>';
    meta.push({label:d.label,emoji:d.emoji||'',color:d.color||'var(--accent)',value:d.value,pct:pp});
  });
  // 图例(含迷你进度条)
  var maxPct=Math.max.apply(null,meta.map(function(m){return m.pct;}));
  var legend=meta.map(function(m,i){
    var barW=(m.pct/maxPct*100).toFixed(1);
    return '<div class="lg" data-i="'+i+'" onmouseenter="pieHover(\''+id+'\','+i+')" onmouseleave="pieHover(\''+id+'\',-1)" onclick="pieClick(\''+id+'\','+i+')">'+
      '<span class="dot" style="background:'+m.color+'"></span>'+
      '<span class="lg-nm">'+(m.emoji?'<span class="lg-emo">'+esc(m.emoji)+'</span>':'')+esc(m.label)+'</span>'+
      '<span class="lg-bar"><i style="width:'+barW+'%;background:'+m.color+'"></i></span>'+
      '<span class="lg-val">'+m.value+'</span>'+
      '<span class="lg-pct">'+m.pct.toFixed(1)+'%</span></div>';
  }).join('');
  // 中心默认显示总量
  var center=_pieCenterHTML(cx,cy,null,tot,null,'总计','');
  window._pieData=window._pieData||{}; window._pieData[id]={meta:meta,tot:tot,cx:cx,cy:cy};
  return '<div class="pieWrap">'+
    '<svg class="pieSvg" id="'+id+'" viewBox="0 0 240 240" preserveAspectRatio="xMidYMid meet">'+
      '<g>'+segs+'</g>'+
      '<g class="pieCenter" id="'+id+'-c">'+center+'</g>'+
    '</svg>'+
    '<div class="pieLegend" id="'+id+'-lg">'+legend+'</div>'+
  '</div>';
}
/* 中心文本生成 (默认态/hover 态复用) */
function _pieCenterHTML(cx,cy,emoji,big,small,bigLabel,smallLabel){
  // 默认态:big=总量,bigLabel='总计'  hover:emoji+名称+占比%+局数
  if(emoji===null){
    return '<text class="c-name" x="'+cx+'" y="'+(cy-6)+'" text-anchor="middle">'+esc(bigLabel)+'</text>'+
           '<text class="c-pct" x="'+cx+'" y="'+(cy+22)+'" text-anchor="middle">'+big+'</text>';
  }
  return '<text class="c-emoji" x="'+cx+'" y="'+(cy-12)+'" text-anchor="middle">'+esc(emoji)+'</text>'+
         '<text class="c-pct" x="'+cx+'" y="'+(cy+20)+'" text-anchor="middle">'+big+'</text>'+
         '<text class="c-cnt" x="'+cx+'" y="'+(cy+40)+'" text-anchor="middle">'+smallLabel+'</text>';
}
/* 点击锁定扇区(触屏主交互;桌面也可点固定) */
function pieClick(id,i){
  window._piePin=window._piePin||{};
  if(window._piePin[id]===i){ window._piePin[id]=-1; pieHover(id,-1); }  // 再点同一个=解锁
  else { window._piePin[id]=i; pieHover(id,i); }
}
function pieHover(id,i){
  var svg=document.getElementById(id);if(!svg)return;
  var data=(window._pieData||{})[id];if(!data)return;
  var lg=document.getElementById(id+'-lg'), cen=document.getElementById(id+'-c');
  var segs=svg.querySelectorAll('.seg'), lgs=lg?lg.querySelectorAll('.lg'):[];
  if(i<0){ // 离开:若有锁定则回到锁定态,否则复位
    var pin=(window._piePin||{})[id];
    if(pin!=null&&pin>=0){ pieHover(id,pin); return; }
    svg.classList.remove('dim');
    segs.forEach(function(s){s.classList.remove('act');s.style.transform='';});
    Array.prototype.forEach.call(lgs,function(l){l.classList.remove('act');});
    if(cen)cen.innerHTML=_pieCenterHTML(data.cx,data.cy,null,data.tot,null,'总计','');
    return;
  }
  var m=data.meta[i];if(!m)return;
  svg.classList.add('dim');
  segs.forEach(function(s){var si=+s.dataset.i;if(si===i){s.classList.add('act');s.style.transform='translate(var(--ox),var(--oy)) scale(1.05)';}else{s.classList.remove('act');s.style.transform='';}});
  Array.prototype.forEach.call(lgs,function(l){l.classList.toggle('act',+l.dataset.i===i);});
  if(cen)cen.innerHTML=_pieCenterHTML(data.cx,data.cy,m.emoji,m.pct.toFixed(1)+'%',null,m.label,m.value+' 局');
}
function sbGet(pathq){
  return fetch(SB.url.replace(/\/$/,'')+'/rest/v1/'+pathq,{
    headers:{'apikey':SB.key,'Authorization':'Bearer '+SB.key}
  }).then(function(r){return r.json();});
}

/* Tab 状态(必须在登录门 IIFE 之前定义,因 IIFE 可能立即 boot→activateTab 用 loaded) */
var TAB_KEY='vc_admin_tab', loaded={};

/* ===================== 登录门 ===================== */
function loggedIn(){try{var t=+localStorage.getItem(AUTH_KEY);return t&&(Date.now()-t)<AUTH_TTL;}catch(e){return false;}}
function logout(){try{localStorage.removeItem(AUTH_KEY);}catch(e){}location.reload();}
(function(){
  var gate=document.getElementById('authGate'), wrap=document.getElementById('mainWrap');
  function pass(){gate.style.display='none';wrap.style.display='';boot();}
  if(loggedIn()){pass();return;}
  var pin=document.getElementById('authPin'),btn=document.getElementById('authBtn'),err=document.getElementById('authErr');
  function tryLogin(){
    var v=(pin.value||'').trim();err.style.color='var(--ink-faint)';err.textContent='校验中…';
    if(!SB.url||!SB.key){err.style.color='var(--bad)';err.textContent='未配置 Supabase';return;}
    sbGet('dashboard_auth?select=pin&limit=1').then(function(rows){
      var real=(rows&&rows[0]&&rows[0].pin)||'';
      if(v&&v===real){try{localStorage.setItem(AUTH_KEY,String(Date.now()));}catch(e){}pass();}
      else {err.style.color='var(--bad)';err.textContent='访问码不正确';}
    }).catch(function(){err.style.color='var(--bad)';err.textContent='网络错误，稍后重试';});
  }
  btn.addEventListener('click',tryLogin);
  pin.addEventListener('keydown',function(e){if(e.key==='Enter')tryLogin();});
})();

/* ===================== Tab 调度(懒加载) ===================== */
function activateTab(p){
  var tab=document.querySelector('.tab[data-p="'+p+'"]');if(!tab)return;
  // 切tab时停止正在播放的背景音乐(如果切出的tab有音乐在播)
  if(typeof stopBgm==='function')stopBgm();
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.querySelectorAll('.page').forEach(function(pg){pg.classList.remove('on');});
  tab.classList.add('on');
  document.getElementById('tab-'+p).classList.add('on');
  // 重型初始化推到下一帧,让 tab 视觉切换先完成,避免"点了卡一下才进"的延迟感
  function defer(fn){if(window.requestAnimationFrame){requestAnimationFrame(function(){requestAnimationFrame(fn);});}else{setTimeout(fn,0);}}
  if(p==='stats'&&!loaded.stats){loaded.stats=1;defer(loadStats);}
  if(p==='doc'&&!loaded.doc){loaded.doc=1;defer(function(){renderDoc();initSfx();});}
  if(p==='tune'&&!loaded.tune){loaded.tune=1;var lv=document.getElementById('live');if(lv)lv.textContent='调参数据生成中...';defer(initTune);}
  if(p==='cfg'&&!loaded.cfg){loaded.cfg=1;defer(renderConfig);}
}
function boot(){
  // ── 映射完整性自检(防 vc↔future 同源镜像漏改埋雷,2026-06-29 加) ──
  try{ if(typeof PERSONA5!=='undefined'&&PERSONA5.archetypes){
    var __masters={}; for(var __k in PERSONA5.archetypes){__masters[PERSONA5.archetypes[__k].master]=1;}
    var __pm=window.PMNAME||{};
    Object.keys(__masters).forEach(function(m){ if(!__pm[m]) console.warn('[映射自检] 大师映射(PMNAME/MNAME)缺 key:',m,'— 该人格大师标注会显示英文/undefined,请补全映射'); });
  }
  if(typeof DATA_PERIODS!=='undefined'){
    var __dp=DATA_PERIODS.periods||DATA_PERIODS;
    if(Array.isArray(__dp)&&typeof TIMES!=='undefined'){
      __dp.forEach(function(p){ if(p&&p.id&&!TIMES[p.id]) console.warn('[映射自检] 时代映射(TIMES)缺 key:',p.id,'— 音乐时代标签会缺失'); });
    }
  } }catch(__e){ console.warn('[映射自检] 执行异常',__e); }
  document.getElementById('logout').onclick=logout;
  Array.prototype.forEach.call(document.querySelectorAll('.tab'),function(tab){
    tab.addEventListener('click',function(){
      var p=tab.dataset.p;try{localStorage.setItem(TAB_KEY,p);}catch(e){}activateTab(p);
    });
  });
  var saved=null;try{saved=localStorage.getItem(TAB_KEY);}catch(e){}
  activateTab(saved&&document.querySelector('.tab[data-p="'+saved+'"]')?saved:'stats');
}

/* ===================== 📊 数据统计 ===================== */
function loadStats(){
  Promise.all([
    sbGet('results?select=*&order=created_at.desc&limit=5000'),
    sbGet('visits?select=id,visitor_id,inviter_id&limit=5000')
  ]).then(function(res){
    var R=res[0]||[],V=res[1]||[];
    if(R.code){document.getElementById('statsContent').innerHTML='<div class="loading">读取失败:'+esc(R.message||'')+'</div>';return;}
    renderStats(R,V);
  }).catch(function(){document.getElementById('statsContent').innerHTML='<div class="loading">加载出错，请刷新重试</div>';});
}
function renderStats(R,V){
  var total=R.length,players={};R.forEach(function(r){if(r.player_id)players[r.player_id]=1;});
  var nPlayers=Object.keys(players).length;
  var bjToday=new Date(Date.now()+8*3600*1000).toISOString().slice(0,10);
  var todayN=R.filter(function(r){return String(r.created_at||'').slice(0,10)===bjToday;}).length;
  var visitN=V.length,invited=R.filter(function(r){return r.is_invited;}).length;
  function box(n,l){return '<div class="box"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}
  function deadRate(){var w=R.filter(function(r){return r.health_dead!=null;});if(!w.length)return '—';var d=w.filter(function(r){return r.health_dead;}).length;return (d/w.length*100).toFixed(0)+'%';}
  // 结局称号 title → {emoji,color} 映射（用于段位渐变柱+emoji；非结局分布传 null）
  function endingMetaMap(){
    var m={};try{var em=(typeof DATA_ENDINGS!=='undefined'&&DATA_ENDINGS.endingMeta)?DATA_ENDINGS.endingMeta:null;if(em){Object.keys(em).forEach(function(k){var e=em[k];if(e&&e.title)m[e.title]={emoji:e.emoji||'',color:e.color||'var(--accent)'};});}}catch(e){}return m;}
  function distBars(key, useMeta){
    var cnt={},tot=0;R.forEach(function(r){var v=r[key];if(v){cnt[v]=(cnt[v]||0)+1;tot++;}});
    var arr=Object.keys(cnt).map(function(k){return [k,cnt[k]];}).sort(function(a,b){return b[1]-a[1];});
    if(!arr.length)return '<div class="loading">暂无数据</div>';
    var mm=useMeta?endingMetaMap():null;
    return arr.map(function(x){var p=pct(x[1],tot);var meta=mm?mm[x[0]]:null;var emo=meta?'<span class="e">'+meta.emoji+'</span>':'';var barStyle=meta?'width:'+p+'%;background:linear-gradient(90deg,'+meta.color+','+meta.color+'aa)':'width:'+p+'%';return '<div class="row">'+emo+'<div class="nm">'+esc(x[0])+'</div><div class="barwrap"><div class="bar" style="'+barStyle+'"></div></div><div class="pct"><span class="pct-val">'+x[1]+'</span><span class="pct-sub">'+p.toFixed(0)+'%</span></div></div>';}).join('');
  }
  // 🏆 结局称号分布 — 环形饼图(真实玩家数据)
  function titlePie(){
    var cnt={};R.forEach(function(r){var v=r.title;if(v)cnt[v]=(cnt[v]||0)+1;});
    var mm=endingMetaMap();
    var data=Object.keys(cnt).map(function(k){var m=mm[k]||{};return {label:k,value:cnt[k],color:m.color||'var(--accent)',emoji:m.emoji||''};}).sort(function(a,b){return b.value-a.value;});
    return donutChart(data);
  }
  function scoreStats(){
    var sc=R.map(function(r){return r.score;}).filter(function(s){return typeof s==='number';}).sort(function(a,b){return a-b;});
    if(!sc.length)return '<div class="loading">暂无数据</div>';
    var sum=sc.reduce(function(a,b){return a+b;},0),q=function(p){return sc[Math.floor(sc.length*p)];};
    return '<div class="kpi">'+box(Math.round(sum/sc.length),'平均分')+box(q(0.5),'中位数')+box(sc[sc.length-1],'最高分')+box(q(0.1),'P10')+box(q(0.9),'P90')+box(sc[0],'最低分')+'</div>';
  }
  function leaderboard(){
    var top=R.filter(function(r){return typeof r.score==='number';}).sort(function(a,b){return b.score-a.score;}).slice(0,20);
    if(!top.length)return '<div class="loading">暂无数据</div>';
    var rows=top.map(function(r,i){var rk=i<3?('<span class="rk g'+(i+1)+'">'+(i+1)+'</span>'):('<span class="rk">'+(i+1)+'</span>');return '<tr><td>'+rk+'</td><td>'+esc(r.player_name||'匿名')+'</td><td>'+esc(r.title||'')+'</td><td class="sc">'+r.score+'</td></tr>';}).join('');
    return '<table><tr><th>#</th><th>玩家</th><th>称号</th><th style="text-align:right">分数</th></tr>'+rows+'</table>';
  }
  function dealHeat(){
    var pick={},bad={};
    R.forEach(function(r){var ps=r.picks;if(!Array.isArray(ps))return;ps.forEach(function(p){var name=p&&p.name;if(!name)return;pick[name]=(pick[name]||0)+1;if(p.tier==='C'||p.tier==='B')bad[name]=(bad[name]||0)+1;});});
    var arr=Object.keys(pick).map(function(k){return [k,pick[k],bad[k]||0];}).sort(function(a,b){return b[1]-a[1];}).slice(0,15);
    if(!arr.length)return '<div class="loading">暂无轨迹数据(需新版答题记录)</div>';
    var max=arr[0][1];
    return arr.map(function(x){var p=pct(x[1],max),badR=x[1]?(x[2]/x[1]*100).toFixed(0):0,badColor=badR>30?'var(--bad)':badR>10?'var(--warn)':'var(--ink-faint)';return '<div class="row"><div class="nm">'+esc(x[0])+'</div><div class="barwrap"><div class="bar" style="width:'+p+'%"></div></div><div class="pct"><span class="pct-val">'+x[1]+'</span><span class="pct-sub" style="color:'+badColor+';background:'+(badR>30?'rgba(168,69,58,.08)':badR>10?'rgba(154,123,58,.1)':'rgba(138,90,58,.07)')+'">踩'+badR+'%</span></div></div>';}).join('');
  }

/* ── UX增强:柱条错落填充 + KPI数字滚动 + 面板依次淡入(借鉴echarts入场,纯JS无依赖) ── */
function enhanceStats(root){
  if(!root)return;
  var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  // 1) 面板依次淡入
  var panels=root.querySelectorAll('.panel');
  Array.prototype.forEach.call(panels,function(p,i){
    p.classList.add('reveal');
    setTimeout(function(){p.classList.add('in');}, reduce?0:i*70);
  });
  // 2) 柱条:把内联width抽成--w,归0后错落展开
  var bars=root.querySelectorAll('.row .bar');
  Array.prototype.forEach.call(bars,function(b,i){
    var w=b.style.width; if(!w)return;
    b.style.setProperty('--w', w);
    b.classList.add('anim');
    setTimeout(function(){b.classList.add('fill');}, reduce?0:120+i*30);
  });
  // 3) KPI大数字 count-up(纯数字/百分比才滚,带%或—的也兼容)
  var nums=root.querySelectorAll('.kpi .box .n');
  Array.prototype.forEach.call(nums,function(el){
    var txt=(el.textContent||'').trim();
    var m=txt.match(/^(\d+)(%?)$/); if(!m){return;}
    var target=parseInt(m[1],10), suffix=m[2]||'';
    if(reduce||target<=0){el.textContent=txt;return;}
    var dur=Math.min(900,300+target*8), t0=null;
    function tick(ts){
      if(!t0)t0=ts; var k=Math.min(1,(ts-t0)/dur);
      var eased=1-Math.pow(1-k,3); // cubicOut
      el.textContent=Math.round(target*eased)+suffix;
      if(k<1)requestAnimationFrame(tick); else el.textContent=target+suffix;
    }
    requestAnimationFrame(tick);
  });
}

function rollOutcome(d,state){
  if(d.trend==='safe')return'A';
  var Pr=CONFIG.probability;
  var luckAdj=((state.luck-50)/50)*P.luckEff;
  var tb=d.trend==='hot'?P.boostHot:(d.trend==='down'?P.boostDown:0);
  var p=clamp(d.base+P.baseAdj+luckAdj+tb,0,1);
  var perf=p*P.perfBase+(1-Math.random())*P.perfDice;
  if(perf>=P.cutSS)return'SS';if(perf>=P.cutS)return'S';if(perf>=P.cutA)return'A';if(perf>=P.cutB)return'B';return'C';
}
function gateLock(deals,state,pi,ri){
  var g=deals.map(function(d){var gt=d.gate;if(!gt)return 0;if(gt.type==='aum')return state.aum<gt.min?'aum':0;if(gt.type==='track')return state.track<gt.min?'track':0;if(gt.type==='health')return state.health<gt.min?'health':0;if(gt.type==='net')return state.network<gt.min?'net':0;return 0;});
  if(g.every(function(x){return x;})){var m=1e9,u=0;deals.forEach(function(d,i){var mn=(d.gate&&d.gate.min)||0;if(mn<m){m=mn;u=i;}});g[u]=0;}
  return g;
}
function calcScore(state){
  var aN=Math.max(0,(state.aum||0)-P.sAum-(state.spent||0));
  var bN=Math.max(0,(state.track||0)-P.sTrack);
  var cN=Math.max(0,(state.network||0)-P.sNet);
  var s=aN*P.coefA+bN*P.coefB+cN*P.coefC;
  if(state.health<=0)s*=P.deadPen;
  return Math.round(Math.max(0,Math.min(1000,s)));
}
function pickEnding(score,state){
  var dead=state.health<=0;
  if(dead&&state.track<P.earlyCap)return'earlyout';
  if(score>=P.cutLegend)return'legend';if(score>=P.cutMaster)return'master';if(score>=P.cutVeteran)return'veteran';
  if(score>=P.cutSteady)return'steady';if(score>=P.cutRoller)return'rollercoaster';return'exit';
}
function pickDeal(deals,state,strat,pi,ri){
  var gl=gateLock(deals,state,pi,ri);
  var cand=deals.map(function(d,i){return{d:d,i:i};}).filter(function(x){return!gl[x.i];});
  if(!cand.length)cand=[{d:deals[0],i:0}];
  if(strat==='greedy')return cand.reduce(function(a,b){return b.d.w.aum>a.d.w.aum?b:a;}).d;
  if(strat==='safe')return cand.reduce(function(a,b){return b.d.base>a.d.base?b:a;}).d;
  if(strat==='trend')return(cand.find(function(x){return x.d.trend==='hot';})||cand[0]).d;
  return cand[Math.floor(Math.random()*cand.length)].d;
}
function play(strat){
  var state={aum:P.sAum,track:P.sTrack,network:P.sNet,luck:P.sLuck,health:P.sHealth,spent:0};
  var up=0,lock={aum:0,track:0,health:0,net:0};
  var MU={SS:P.mSS,S:P.mS,A:P.mA,B:P.mB,C:P.mC};
  var periods=DATA_PERIODS.periods;
  for(var pi=0;pi<periods.length;pi++){
    var p=periods[pi];
    for(var ri=0;ri<p.rounds.length;ri++){
      if(state.health<=0)break;
      var r=p.rounds[ri];
      gateLock(r.deals,state,pi,ri).forEach(function(x){if(x)lock[x]++;});
      var d=pickDeal(r.deals,state,strat,pi,ri);
      var sm=(d.amt||0)>state.aum;
      state.spent+=(d.amt||0);
      var tier=rollOutcome(d,state);
      var mult=MU[tier];
      var tg=1;
      if(mult>0){if(d.trend==='up')tg=Math.max(P.upFloor,Math.pow(P.upDecay,up));else if(d.trend==='hot'||d.trend==='down')tg=P.hotGain;}
      if(d.trend==='up')up++;

      var eff=mult*tg*sf;
      state.aum=Math.max(0,state.aum+Math.round(d.w.aum*eff));
      state.track=Math.max(0,state.track+Math.round(d.w.track*eff));
      state.network=Math.max(0,state.network+Math.round((d.w.net||0)*Math.max(0.3,eff>0?eff:0.3)*sf));
      state.luck=clamp(state.luck+({SS:P.ldSS,S:P.ldS,A:0,B:P.ldB,C:P.ldC}[tier]||0),0,100);
      var dh=-Math.round(P.hBase+pi*P.hRamp);
      if(tier==='C')dh-=P.hC;else if(tier==='B')dh-=P.hB;else if(tier==='SS')dh+=P.hSS;
      state.health=clamp(state.health+dh,0,100);
    }

}

var list=document.getElementById('sfxList');
GROUPS.forEach(g=>{
  const grp=document.createElement('div'); grp.className='grp';
  grp.innerHTML=`<div class="grp-t">${g.t}</div>`;
  g.items.forEach(it=>{
    const row=document.createElement('div'); row.className='srow sfx-row';
    row.innerHTML=`<div class="play"></div><div class="info"><div class="nm2">${it.nm}</div><div class="ds">${it.ds}</div></div><div class="wave"><span></span><span></span><span></span><span></span></div>`;
    row.onclick=()=>{
      try{
        if(!window.Sfx) return;
        Sfx.unlock();
        // 点音效先停掉正在播放的背景音乐(避免音乐+音效叠在一起)
        if(typeof stopBgm==='function'){ try{ stopBgm(); }catch(e){} }
        if(it.type==='hover'){ Sfx.playHover(it.k); }
        else { Sfx.play(it.k); }
        // 播放态反馈:点击瞬间亮起,按音效时长后自动复位(短音效闪一下,start类长音效约1.6s)
        // 只清音效行,不动正在播放的背景音乐行(music-row)
        const dur = it.type==='hover' ? 220 : (/^start/.test(it.k) ? 1600 : 420);
        document.querySelectorAll('#sfxPanel .sfx-row.playing').forEach(r=>{ if(r!==row){ r.classList.remove('playing'); clearTimeout(r._pt); } });
        row.classList.add('playing');
        clearTimeout(row._pt);
        row._pt=setTimeout(()=>row.classList.remove('playing'), dur);
      }catch(e){}
    };
    grp.appendChild(row);
  });
  list.appendChild(grp);
});

// ===== 背景音乐 · 多版本分组试听(新旧分开,不交错) =====
const TIMES={P1:'Ⅰ 门户泡沫(00-04)',P2:'Ⅱ Web2.0(05-09)',P3:'Ⅲ 移动互联(10-15)',P4:'Ⅳ 硬科技(16-22)',P5:'Ⅴ AI新纪元(23-26)'};
function makeMusicRow(file,label,ds){
  const row=document.createElement('div'); row.className='srow music-row';
  row.innerHTML=`<div class="play"></div><div class="info"><div class="nm2">${label}</div><div class="ds">${ds}</div></div><div class="wave"><span></span><span></span><span></span><span></span></div>`;
  row.onclick=()=>{ try{
    if(bgmPlaying===row){ stopBgm(); return; }
    stopBgm();
    if(!bgmAudio){ bgmAudio=new Audio(); bgmAudio.loop=true; bgmAudio.volume=0.7; }
    bgmAudio.src='audio/'+file+'?v=20260702authcolor';
    bgmAudio.play().catch(()=>{});
    row.classList.add('playing'); bgmPlaying=row;
  }catch(e){} };
  return row;
}
function musicGroup(title, suffix, ds){
  const g=document.createElement('div'); g.className='grp';
  g.innerHTML='<div class="grp-t">'+title+'</div>';
  ['P1','P2','P3','P4','P5'].forEach(k=>{
    g.appendChild(makeMusicRow(k+suffix+'.mp3', TIMES[k], ds));
  });
  list.appendChild(g);
}
// 背景音乐(游戏实际使用的就是这套: audio/P1.mp3 ~ P5.mp3,无后缀)
musicGroup('🎵 时代背景音乐 · 5 时代各一首','','游戏实际播放·胡伟立风格配乐');
